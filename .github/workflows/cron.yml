# ============================================================================
# The automation heartbeat.
#
# ClaimReach's automation engine was fully built and had never run: the queue,
# the executor and /api/cron/automations all existed, but nothing on a schedule
# ever called them, so every queued step sat pending forever and automations
# looked broken in the hardest way to diagnose — silently.
#
# Cloudflare Pages has no native cron, so the schedule lives here. GitHub runs
# this every 5 minutes and pings the drain endpoints.
#
# SETUP (one time): repo Settings > Secrets and variables > Actions, add
#   CRON_SECRET  — must match the CRON_SECRET set in Cloudflare Pages env vars.
#
# Note: GitHub's scheduler can drift by a few minutes under load. That is fine
# for a 10-minute undo window; it is not a hard real-time guarantee.
# ============================================================================
name: ClaimReach automation heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you fire it by hand to test

jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - name: Drain the automation queue
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://claimreach.com/api/cron/automations)
          echo "automations -> HTTP $code"
          cat /tmp/out.txt
          if [ "$code" != "200" ]; then echo "::error::automation drain failed"; exit 1; fi

      - name: Run due drips
        run: |
          code=$(curl -s -o /tmp/drips.txt -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://claimreach.com/api/cron/drips)
          echo "drips -> HTTP $code"
          cat /tmp/drips.txt
          if [ "$code" != "200" ]; then echo "::error::drip run failed"; exit 1; fi
